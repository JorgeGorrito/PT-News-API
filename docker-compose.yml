version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: pt-news-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pt_news_api
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - pt-news-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # PT News API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pt-news-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Database configuration
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: app_user
      DB_PASSWORD: app_password
      DB_NAME: pt_news_api
      # Application configuration
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pt-news-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/swagger/index.html"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

networks:
  pt-news-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
